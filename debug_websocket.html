<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Debug Tool</title>
    <style>
        body { font-family: monospace; margin: 20px; }
        .container { max-width: 800px; }
        .controls { margin: 20px 0; }
        button { margin: 5px; padding: 8px 15px; }
        .log { 
            background: #f0f0f0; 
            padding: 10px; 
            height: 400px; 
            overflow-y: scroll; 
            border: 1px solid #ccc;
            margin: 10px 0;
        }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        input[type="text"] { width: 400px; padding: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>CLogG5 WebSocket Debug Tool</h2>
        
        <div class="controls">
            <input type="text" id="serverUrl" value="ws://127.0.0.1:8847/api/ws" placeholder="WebSocket URL">
            <button onclick="connect()">Connect</button>
            <button onclick="disconnect()">Disconnect</button>
            <span id="status">Disconnected</span>
        </div>
        
        <div class="controls">
            <input type="text" id="filePath" value="C:\\temp\\test.log" placeholder="File path to test">
            <button onclick="testLoadFile()">Test Load File</button>
            <button onclick="testPing()">Test Ping</button>
            <button onclick="clearLog()">Clear Log</button>
        </div>
        
        <div id="log" class="log"></div>
    </div>

    <script>
        let ws = null;
        let requestId = 0;
        let pendingRequests = new Map();

        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logDiv = document.getElementById('log');
            const line = document.createElement('div');
            line.className = type;
            line.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(line);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateStatus(status) {
            document.getElementById('status').textContent = status;
        }

        function connect() {
            const url = document.getElementById('serverUrl').value;
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                log('Already connected', 'info');
                return;
            }

            log(`Connecting to ${url}...`, 'info');
            updateStatus('Connecting...');

            ws = new WebSocket(url);
            
            ws.onopen = function() {
                log('WebSocket connected successfully', 'success');
                updateStatus('Connected');
            };
            
            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    log(`Received: ${JSON.stringify(data, null, 2)}`, 'success');
                    
                    // Handle responses to our requests
                    if (data.requestId && pendingRequests.has(data.requestId)) {
                        const request = pendingRequests.get(data.requestId);
                        pendingRequests.delete(data.requestId);
                        clearTimeout(request.timeout);
                        request.resolve(data);
                    }
                } catch (error) {
                    log(`Failed to parse message: ${event.data}`, 'error');
                }
            };
            
            ws.onerror = function(error) {
                log(`WebSocket error: ${error}`, 'error');
                updateStatus('Error');
            };
            
            ws.onclose = function() {
                log('WebSocket connection closed', 'info');
                updateStatus('Disconnected');
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function sendMessage(type, data = {}) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('WebSocket not connected', 'error');
                return Promise.reject(new Error('Not connected'));
            }

            const message = {
                type: type,
                requestId: ++requestId,
                ...data
            };

            log(`Sending: ${JSON.stringify(message, null, 2)}`, 'info');

            return new Promise((resolve, reject) => {
                const timeout = setTimeout(() => {
                    if (pendingRequests.has(message.requestId)) {
                        pendingRequests.delete(message.requestId);
                        reject(new Error(`Request timeout for ${type}`));
                    }
                }, 30000);

                pendingRequests.set(message.requestId, { resolve, reject, timeout });
                
                try {
                    ws.send(JSON.stringify(message));
                } catch (error) {
                    pendingRequests.delete(message.requestId);
                    clearTimeout(timeout);
                    reject(error);
                }
            });
        }

        async function testPing() {
            try {
                log('Testing ping...', 'info');
                const response = await sendMessage('ping', { timestamp: Date.now() });
                log(`Ping successful: ${JSON.stringify(response)}`, 'success');
            } catch (error) {
                log(`Ping failed: ${error.message}`, 'error');
            }
        }

        async function testLoadFile() {
            const filePath = document.getElementById('filePath').value;
            if (!filePath) {
                log('Please enter a file path', 'error');
                return;
            }

            try {
                log(`Testing load_file for: ${filePath}`, 'info');
                const response = await sendMessage('load_file', {
                    panelId: 'left',
                    filePath: filePath,
                    options: {}
                });
                log(`Load file successful: ${JSON.stringify(response, null, 2)}`, 'success');
            } catch (error) {
                log(`Load file failed: ${error.message}`, 'error');
            }
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        // Auto-connect on page load
        window.onload = function() {
            log('WebSocket Debug Tool loaded', 'info');
        };
    </script>
</body>
</html>
