<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter Pill Product Component</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="filterpill-enhanced.css">
    <link rel="stylesheet" href="main_product.css">
</head>
<body>
    <!-- PRODUCT CONTAINER -->
    <div class="filter-area">
        <div class="filter-controls">
            <div class="filter-controls-left">
                <button class="modal-toggle-btn on" id="modalToggle">ON</button>
                <button class="add-filter-btn" id="addFilterBtn">+ Add Filter</button>
                <button id="disableSelectedTermsBtn" class="disable-selected-terms-btn" disabled>Disable Selected Terms</button>
            </div>
            <div class="filter-controls-right">
                <button id="clearAllBtn" class="clear-all-btn" title="Clear all filters and reset to default state">Clear</button>
                <span style="margin-left: 20px;"></span>
                <button id="saveExpressionBtn" class="modal-toggle-btn on">Save</button>
                <button id="loadExpressionBtn" class="modal-toggle-btn on">Load</button>
            </div>
        </div>

        <div class="filters-container" id="filtersContainer">
            <div class="placeholder-text" style="color: var(--text-muted); font-style: italic; pointer-events: none; user-select: none;">
                Click "Add Filter" to create filter pills, or click anywhere here to add operators
            </div>
        </div>
    </div> <!-- end PRODUCT CONTAINER -->

    <!-- Save/Load Expression Modals -->
    <div class="modal-overlay" id="saveModal">
        <div class="modal">
            <div class="modal-title">
                <span>💾</span>
                <span>Save Filter Expression</span>
            </div>
            <div class="modal-content">
                <input type="text" class="modal-input" id="expressionName" placeholder="Enter expression name...">
                <textarea class="modal-textarea" id="expressionJson" placeholder="Expression JSON will appear here..." readonly></textarea>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="SaveLoad.closeSaveModal()">Cancel</button>
                <button class="modal-btn" onclick="SaveLoad.saveExpression()">Save</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="loadModal">
        <div class="modal">
            <div class="modal-title">
                <span>📁</span>
                <span>Load Filter Expression</span>
            </div>
            <div class="modal-content">
                <div class="saved-expressions" id="savedExpressionsList">
                    <!-- Saved expressions will appear here -->
                </div>
                <div style="margin-bottom: 15px;">
                    <strong>Or paste JSON directly:</strong>
                </div>
                <textarea class="modal-textarea" id="importJson" placeholder="Paste expression JSON here..."></textarea>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn danger" onclick="SaveLoad.clearSavedExpressions()" style="margin-right: auto;">Clear All Saved</button>
                <button class="modal-btn cancel" onclick="SaveLoad.closeLoadModal()">Cancel</button>
                <button class="modal-btn" onclick="SaveLoad.loadExpression()">Load</button>
            </div>
        </div>
    </div>

    <!-- Operator Input -->
    <div class="operator-input" id="operatorInput">
        <div class="operator-buttons">
            <button class="operator-btn and" onclick="OperatorPopup.insertOperator('AND')">AND</button>
            <button class="operator-btn or" onclick="OperatorPopup.insertOperator('OR')">OR</button>
            <button class="operator-btn" onclick="OperatorPopup.insertOperator('NOT')">NOT</button>
            <button class="operator-btn paren" onclick="OperatorPopup.insertOperator('(')">(</button>
            <button class="operator-btn paren" onclick="OperatorPopup.insertOperator(')')">)</button>
        </div>
    </div>

    <!-- Drop Indicator -->
    <div class="drop-indicator" id="dropIndicator"></div>

    <!-- Load all modules in dependency order -->
    <script src="TimeParser.js"></script>

    <!-- Core element classes (depend on TimeParser) -->
    <script src="FilterPill.js"></script>
    <script src="TimePill.js"></script>
    <script src="Operator.js"></script>

    <!-- Filter system modules (in dependency order) -->
    <script src="FilterState.js"></script>
    <script src="FilterElements.js"></script>
    <script src="FilterInteraction.js"></script>
    <script src="FilterTermsDisable.js"></script>
    <script src="FilterManager.js"></script>

    <!-- UI components that use the filter system -->
    <script src="OperatorPopup.js"></script>
    <script src="SaveLoad.js"></script>

    <!-- Application layer (uses everything) -->
    <script src="FilterPillsApp.js"></script>
    <!--<script src="Demo.js"></script>-->
    
    <script>
        // Modal toggle functionality - instance aware
        function setupModalToggleForInstance(instanceId) {
            const suffix = instanceId ? `_${instanceId}` : '';
            const modalToggle = document.getElementById(`modalToggle${suffix}`);
            if (!modalToggle) return;
            
            modalToggle.addEventListener('click', function() {
                const btn = this;
                const isOn = btn.classList.contains('on');
                
                if (isOn) {
                    // Switch to OFF
                    btn.classList.remove('on');
                    btn.classList.add('off');
                    btn.textContent = 'OFF';
                    
                    // Disable the filter system visually - use instance-scoped IDs
                    const container = document.getElementById(`filtersContainer${suffix}`);
                    const addBtn = document.getElementById(`addFilterBtn${suffix}`);
                    const disableBtn = document.getElementById(`disableSelectedTermsBtn${suffix}`);
                    const clearBtn = document.getElementById(`clearAllBtn${suffix}`);
                    const saveBtn = document.getElementById(`saveExpressionBtn${suffix}`);
                    const loadBtn = document.getElementById(`loadExpressionBtn${suffix}`);
                    
                    if (container) {
                        container.style.opacity = '0.4';
                        container.style.pointerEvents = 'none';
                    }
                    if (addBtn) addBtn.disabled = true;
                    if (disableBtn) disableBtn.disabled = true;
                    if (clearBtn) clearBtn.disabled = true;
                    if (saveBtn) saveBtn.disabled = true;
                    if (loadBtn) loadBtn.disabled = true;
                    
                    console.log(`🔴 Filter system disabled for instance: ${instanceId || 'default'}`);
                } else {
                    // Switch to ON
                    btn.classList.remove('off');
                    btn.classList.add('on');
                    btn.textContent = 'ON';
                    
                    // Enable the filter system - use instance-scoped IDs
                    const container = document.getElementById(`filtersContainer${suffix}`);
                    const addBtn = document.getElementById(`addFilterBtn${suffix}`);
                    const disableBtn = document.getElementById(`disableSelectedTermsBtn${suffix}`);
                    const clearBtn = document.getElementById(`clearAllBtn${suffix}`);
                    const saveBtn = document.getElementById(`saveExpressionBtn${suffix}`);
                    const loadBtn = document.getElementById(`loadExpressionBtn${suffix}`);
                    
                    if (container) {
                        container.style.opacity = '1';
                        container.style.pointerEvents = 'auto';
                    }
                    if (addBtn) addBtn.disabled = false;
                    if (clearBtn) clearBtn.disabled = false;
                    if (saveBtn) saveBtn.disabled = false;
                    if (loadBtn) loadBtn.disabled = false;
                    // disableBtn state depends on selection - leave as is
                    
                    console.log(`🟢 Filter system enabled for instance: ${instanceId || 'default'}`);
                }
            });
        }
        
        // Function to initialize modal toggle for current instance
        // This will be called by main_index.html after setting up instances
        window.initializeModalToggle = function(instanceId) {
            setupModalToggleForInstance(instanceId);
        };
    </script>
</body>
</html>
